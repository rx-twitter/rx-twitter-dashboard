name: CI-dashboard

on:
  pull_request:
    branches: ["main", "develop"]

jobs:
  setup:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: "https://npm.pkg.github.com"
          scope: "@twitterrx"

      - name: Install dependencies
        run: npm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save node_modules cache
        uses: actions/cache/save@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package.json') }}

  lint:
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Restore node_modules cache
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package.json') }}
          fail-on-cache-miss: true

      - name: Run OxLint
        run: npm run lint

  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Restore node_modules cache
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package.json') }}
          fail-on-cache-miss: true

      - name: Run tests with coverage
        run: npm run test:coverage

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Restore node_modules cache
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package.json') }}
          fail-on-cache-miss: true

      - name: Generate Drizzle migrations
        run: npm run db:generate

      - name: Check for uncommitted migration files
        run: |
          if ! git diff --exit-code -- drizzle/; then
            echo "::error::drizzle/ has uncommitted changes after db:generate."
            echo "Run 'npm run db:generate' locally and commit the result."
            exit 1
          fi

      - name: Build Dashboard
        run: npm run build

      - name: Check build output
        run: |
          if [ ! -d "dist" ]; then
            echo "Build failed: dist directory not found"
            exit 1
          fi
          echo "Build successful"
